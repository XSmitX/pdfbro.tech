# ============================================================
# Nginx Configuration — PDFBro Static Export Hosting
# ============================================================
# Place at: /etc/nginx/sites-available/pdfbro.tech
# Symlink:  ln -s /etc/nginx/sites-available/pdfbro.tech /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name pdfbro.tech www.pdfbro.tech;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pdfbro.tech www.pdfbro.tech;

    # ── SSL (Let's Encrypt) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/pdfbro.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdfbro.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/pdfbro.tech/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Root directory — static export output ─────────────────
    root /var/www/pdfbro.tech/out;
    index index.html;

    client_max_body_size 150m;
    client_body_timeout 60s;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-DNS-Prefetch-Control "on" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://*.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://api.qrserver.com https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https://*.analytics.google.com; worker-src 'self' blob:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # Hide Nginx version
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # ── Block exploit probes ─────────────────────────────────
    location ~* ^/(wp-admin|wp-login|xmlrpc\.php|\.env|\.git|phpmyadmin) {
        return 404;
    }
    location ~* \.(php|asp|aspx|jsp)$ {
        return 404;
    }

    # ── API reverse proxy (to PM2-managed backend on :3003) ──
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 150m;
        proxy_read_timeout 120s;
    }

    # ── Static files with caching ────────────────────────────
    # Hashed assets (immutable, 1 year cache)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SVG files (1 day cache with stale-while-revalidate)
    location ~* \.svg$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
    }

    # Other static assets (images, fonts)
    location ~* \.(ico|png|jpg|jpeg|webp|woff2?|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        expires 1w;
        access_log off;
    }

    # robots.txt, sitemap.xml, llms.txt (1 hour cache)
    location ~* ^/(robots\.txt|sitemap\.xml|llms\.txt|llms-full\.txt)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── HTML pages with trailing slashes ─────────────────────
    # Next.js static export uses /slug/index.html pattern
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom 404 ───────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Rate limiting ────────────────────────────────────────
    # NOTE: limit_req_zone directives must go in the http{} block
    # of /etc/nginx/nginx.conf, NOT inside a server{} block.
    # Add these two lines to your main nginx.conf http block:
    #
    #   limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
    #   limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    #
    # Then the limit_req directives below will work.

    # ── Deny access to hidden files ──────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
